<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnackHub | Toko Camilan</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- Google Analytics Dummy -->
<script>
console.log("Google Analytics Dummy Aktif");

// Simulasi Tracking
function trackEvent(eventName) {
    console.log("Event:", eventName);
}
</script>
</head>
<body>

<!-- ================= NAVBAR ================= -->

<header>
    <nav class="navbar">
        <h2 class="logo">🍿 SnackHub</h2>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#produk">Produk</a></li>
            <li><a href="cart.html">Keranjang 🛒</a></li>
        </ul>
    </nav>
</header>

<!-- ================= HERO ================= -->

<section class="hero">

    <div class="hero-text">
        <h1>Camilan Favorit untuk Semua!</h1>

        <p>
            Nikmati berbagai camilan lezat dengan harga terjangkau
            dan kualitas terbaik.
        </p>

        <a href="#produk" class="btn">
            Belanja Sekarang
        </a>

    </div>

</section>

<!-- ================= SEARCH ================= -->

<section class="search-section">

    <input
        type="text"
        id="search"
        placeholder="🔍 Cari camilan..."
    >

    <select id="category">

        <option value="all">Semua</option>
        <option value="Keripik">Keripik</option>
        <option value="Biskuit">Biskuit</option>
        <option value="Permen">Permen</option>
        <option value="Kacang">Kacang</option>

    </select>

</section>

<!-- ================= PRODUK ================= -->

<section id="produk">

    <h2 class="section-title">
        Produk Kami
    </h2>

    <div id="product-list" class="products">

        <!-- Produk akan muncul dari JavaScript -->

    </div>

</section>

<!-- ================= FOOTER ================= -->

<footer>

    <p>
        © 2025 SnackHub | Renyah, Lezat, dan Selalu Bikin Nagih!
    </p>

</footer>
<!-- ================= MODAL DETAIL ================= -->

<div id="product-modal" class="modal">

    <div class="modal-content">

        <span class="close">&times;</span>

        <img id="modal-image" src="" alt="">

        <h2 id="modal-name"></h2>

        <p id="modal-price"></p>

        <p id="modal-description"></p>

        <button id="modal-cart-btn" class="btn">
            🛒 Tambah ke Keranjang
        </button>

    </div>

</div>

<!-- JavaScript -->
<script src="js/products.js"></script>
<script src="js/app.js"></script>

</body>
</html>
